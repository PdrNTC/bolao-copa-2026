<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palpites Grupos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f0f2f5; }</style>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">⚽ Bolão 2026</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="{% url 'ranking' %}">Ranking</a>
            <a class="nav-link" href="{% url 'palpites' %}">Jogos</a>
            <a class="nav-link active" href="#">Grupos</a>
            <a class="nav-link" href="{% url 'palpites_matamata' %}">Mata-Mata</a>
            <a class="nav-link" href="{% url 'palpites_extras' %}">Bônus</a>
        </div>
        <span class="navbar-text text-white">Olá, {{ user.username }}</span>
      </div>
    </nav>

    <div class="container mb-5">
      <h2 class="text-center mb-4">🌍 Classificação dos Grupos</h2>
      <div class="alert alert-info text-center">
        Acerte a ordem exata (75pts) ou invertida (40pts). 1º lugar vale 55pts e 2º lugar 50pts.
      </div>

      <form method="POST">
        {% csrf_token %}
        
        <div class="row">
            {% for item in dados_grupos %}
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">
                        Grupo {{ item.letra }}
                    </div>
                    <div class="card-body">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-success">1º Colocado:</label>
                            <input type="text" class="form-control" 
                                   name="primeiro_{{ item.letra }}" 
                                   placeholder="Ex: Brasil"
                                   value="{{ item.prim_atual }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">2º Colocado:</label>
                            <input type="text" class="form-control" 
                                   name="segundo_{{ item.letra }}" 
                                   placeholder="Ex: Suíça"
                                   value="{{ item.seg_atual }}" required>
                        </div>

                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-success btn-lg px-5">SALVAR GRUPOS</button>
        </div>
      </form>

    </div>
  </body>
</html>
