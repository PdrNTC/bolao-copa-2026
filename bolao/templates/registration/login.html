<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar - Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'imgs/logo_copa_2026.png' %}">

    <style>
      /* --- BACKDROP LOGIC (CAMADA SUAVE E INTEGRADA) --- */
      body {
        background-image: url("{% static 'imgs/img_copa_fundo_login.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #00122b; 
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
        padding: 15px;
      }

      /* Película escura com desfoque de lente para isolar o fundo espalhafatoso */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 18, 43, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 1;
      }

      /* --- CARD DO FORMULÁRIO (ESTILO CONSOLE) --- */
      .auth-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 440px;
        background-color: #f8f9fa;
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      }

      /* 📌 COMPONENTE: ABA DUPLA SUPERIOR DE ALTERNÂNCIA */
      .segment-control {
        background: #e9ecef;
        padding: 6px;
        border-radius: 16px;
        display: flex;
        margin-bottom: 30px;
      }
      .segment-control .btn-tab {
        width: 50%;
        border: none;
        padding: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        border-radius: 12px;
        transition: all 0.2s ease;
        text-align: center;
        text-decoration: none;
      }
      .segment-control .btn-tab.active {
        background: #ffffff;
        color: #00122b;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      }
      .segment-control .btn-tab.inactive {
        background: transparent;
        color: #6c757d;
      }
      .segment-control .btn-tab.inactive:hover {
        color: #333;
      }

      /* Elementos Textuais */
      .auth-title {
        color: #00122b;
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        color: #5c677d;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      /* Customização de Inputs Clássicos */
      .form-label {
        color: #00122b;
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 6px;
      }
      .form-control {
        border: 2px solid #dee2e6;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        color: #00122b;
        background-color: #fff;
      }
      .form-control:focus {
        border-color: #0d6efd;
        box-shadow: none;
        background-color: #fff;
      }

      /* Botão de Envio Principal (Verde Copa) */
      .btn-submit {
        background-color: #00875a;
        color: #ffffff;
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-weight: 700;
        font-size: 1rem;
        transition: background 0.2s;
        box-shadow: 0 4px 12px rgba(0, 135, 90, 0.2);
      }
      .btn-submit:hover {
        background-color: #00704a;
        color: #ffffff;
      }

      .utility-link {
        color: #0d6efd;
        font-size: 0.85rem;
        font-weight: 700;
        text-decoration: none;
      }
      .utility-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>

    <main class="auth-container">
      
      <nav class="segment-control" aria-label="Navegação de Autenticação">
        <span class="btn-tab active">Entrar</span>
        <a href="{% url 'cadastro' %}" class="btn-tab inactive">Criar conta</a>
      </nav>

      <div class="mb-4">
        <h1 class="auth-title mb-1">Bem-vindo de volta</h1>
        <p class="auth-subtitle mb-0">Insira suas credenciais para gerenciar seus palpites e conferir seu desempenho.</p>
      </div>
      
      <form method="post">
          {% csrf_token %}

          {% if form.errors %}
              <div class="alert alert-danger p-3 mb-3 border-0 small fw-bold" style="border-radius: 10px; background-color: #f8d7da; color: #842029;">
                  ⚠️ Usuário ou senha incorretos. Por favor, tente novamente.
              </div>
          {% endif %}

          <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" name="username" class="form-control" placeholder="Seu nome de usuário" required autocomplete="username">
          </div>
          
          <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-1">
                  <label class="form-label mb-0">Senha</label>
                  <a href="{% url 'password_reset' %}" class="utility-link" style="font-size: 0.8rem;">Recuperar senha</a>
              </div>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-submit w-100 shadow-sm mt-2">
              Entrar no bolão
          </button>
      </form>
      
    </main>

  </body>
</html>
