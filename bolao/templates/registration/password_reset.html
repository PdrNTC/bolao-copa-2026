<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Senha - Bolão Copa 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'imgs/logo_copa_2026.png' %}">

    <style>
      /* --- BACKDROP LOGIC (DESFOQUE DA IMAGEM DE FUNDO) --- */
      body {
        background-image: url("{% static 'imgs/img_copa_fundo_login.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #00122b; 
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
        padding: 15px;
      }

      /* Película escura com desfoque de lente para isolar o fundo */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 18, 43, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 1;
      }

      /* --- CARD DO FORMULÁRIO --- */
      .auth-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 440px;
        background-color: #f8f9fa;
        border-radius: 24px;
        padding: 40px 30px 30px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      }

      .auth-title {
        color: #00122b;
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: -0.5px;
      }
      .auth-subtitle {
        color: #5c677d;
        font-size: 0.9rem;
        line-height: 1.4;
      }

      /* --- AJUSTE CIRÚRGICO PARA ESTILIZAR O FORMULÁRIO DO DJANGO (form.as_p) --- */
      .auth-container p {
        margin-bottom: 20px;
      }
      .auth-container p label {
        color: #00122b;
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 6px;
        display: block;
      }
      .auth-container p input {
        display: block;
        width: 100%;
        border: 2px solid #dee2e6;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        color: #00122b;
        background-color: #fff;
        transition: border-color 0.2s;
      }
      .auth-container p input:focus {
        border-color: #0d6efd;
        outline: none;
        background-color: #fff;
      }

      /* Botão de Envio Principal (Verde Copa) */
      .btn-submit {
        background-color: #00875a;
        color: #ffffff;
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-weight: 700;
        font-size: 1rem;
        transition: background 0.2s;
        box-shadow: 0 4px 12px rgba(0, 135, 90, 0.2);
      }
      .btn-submit:hover {
        background-color: #00704a;
        color: #ffffff;
      }

      .utility-link {
        color: #0d6efd;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
      }
      .utility-link:hover {
        text-decoration: underline;
        color: #0a58ca;
      }
    </style>
  </head>
  <body>

    <main class="auth-container">
      
      <div class="mb-4 text-center">
        <span class="d-block mb-2" style="font-size: 2.5rem;">🔒</span>
        <h1 class="auth-title mb-2">Recuperar senha</h1>
        <p class="auth-subtitle mx-auto">Digite seu e-mail cadastrado abaixo. O sistema fará uma varredura segura e enviará um link direto para você redefinir sua senha.</p>
      </div>
      
      <form method="post">
          {% csrf_token %}
          
          {{ form.as_p }}

          <button type="submit" class="btn btn-submit w-100 shadow-sm mt-2">
              Enviar link de redefinição
          </button>
      </form>
      
      <hr class="my-4" style="border-top: 1px solid #dee2e6; opacity: 1;">
      
      <div class="text-center">
          <a href="{% url 'login' %}" class="utility-link">Voltar para o Login</a>
      </div>
      
    </main>

  </body>
</html>
