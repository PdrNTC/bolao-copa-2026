<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Conta - Bolão 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}

    <link rel="icon" type="image/png" href="{% static 'imgs/logo_copa_2026.png' %}">

    <style>
      body {
        background-image: url("{% static 'imgs/img_copa_fundo_login.png' %}"); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f0f2f5;
      }

      .cadastro-card {
        background-color: rgba(255, 255, 255, 0.92);
        border: none;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card cadastro-card shadow p-4 p-md-5" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Novo Jogador</h3>
        
        <form method="post">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger py-2 mb-3" style="font-size: 0.9rem;">
                        <strong>Ops!</strong> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="mb-3">
                <label class="form-label" style="font-weight: 500;">Usuário</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 500;">E-mail</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" style="font-weight: 500;">Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" style="font-weight: 500;">Confirmar Senha</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn w-100 mt-3 p-2 fw-bold shadow-sm text-white" style="background-color: #044A80; border: none;">
                Cadastrar
            </button>
        </form>
        
        <hr class="mt-4">
        
        <div class="text-center mt-2">
            <p class="mb-2 text-muted">Já possui uma conta?</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm px-4">Fazer Login</a>
        </div>
    </div>
  </body>
</html>
